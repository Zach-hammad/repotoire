name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: repotoire-linux-x86_64.tar.gz
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: repotoire-macos-aarch64.tar.gz
          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: repotoire-macos-x86_64.tar.gz
            cross: true
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: repotoire-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cd repotoire-cli && cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd repotoire-cli/target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }} repotoire

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd repotoire-cli/target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }} repotoire.exe

      - name: Upload artifact to release
        run: gh release upload "${{ github.event.release.tag_name }}" "repotoire-cli/${{ matrix.artifact }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cd repotoire-cli && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Notify repotoire-action
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.RELEASE_PAT }}
          repository: Zach-hammad/repotoire-action
          event-type: new-release
          client-payload: '{"version": "${{ github.event.release.tag_name }}"}'
