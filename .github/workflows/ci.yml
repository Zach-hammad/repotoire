name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  RUSTFLAGS: -Dwarnings

jobs:
  product-facts:
    name: Product Facts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check generated product facts
        run: python3 scripts/product_facts.py --check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cd repotoire-cli && cargo fmt --all -- --check

  test:
    name: Test (${{ matrix.partition }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            repotoire-cli -> target
          shared-key: test

      - name: Run tests
        run: cd repotoire-cli && cargo nextest run --all-features --partition count:${{ matrix.partition }}/2

      - name: Run doc tests
        if: matrix.partition == 1
        run: cd repotoire-cli && cargo test --all-features --doc

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            repotoire-cli -> target
          shared-key: clippy

      - name: Run Clippy
        run: cd repotoire-cli && cargo clippy --all-features -- -D warnings
