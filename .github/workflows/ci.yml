name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  product-facts:
    name: Product Facts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check generated product facts
        run: python3 scripts/product_facts.py --check

  rust-ci:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            repotoire-cli -> target

      - name: Run tests
        run: cd repotoire-cli && cargo test --all-features

      - name: Run Clippy
        run: cd repotoire-cli && cargo clippy --all-features -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cd repotoire-cli && cargo fmt --all -- --check
