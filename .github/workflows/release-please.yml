name: Release Please

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      prs_created: ${{ steps.rp.outputs.prs_created }}
      pr_branch: ${{ steps.rp.outputs.prs_created == 'true' && fromJSON(steps.rp.outputs.pr).headBranchName || '' }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-lockfile:
    needs: release-please
    if: needs.release-please.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.pr_branch }}
          token: ${{ secrets.RELEASE_PAT }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        run: cd repotoire-cli && cargo update --workspace

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repotoire-cli/Cargo.lock
          git diff --cached --quiet || git commit -m "chore: update Cargo.lock for release"
          git push
