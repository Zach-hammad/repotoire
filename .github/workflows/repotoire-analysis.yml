name: Repotoire Code Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze Code Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            repotoire-cli -> target

      - name: Build and analyze current checkout
        run: |
          mkdir -p "$RUNNER_TEMP/repotoire-results"
          cargo run --manifest-path repotoire-cli/Cargo.toml -- analyze . \
            --format sarif \
            --output "$RUNNER_TEMP/repotoire-results/results.sarif.json" \
            --json-sidecar "$RUNNER_TEMP/repotoire-results/results.json" \
            --per-page 0

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ runner.temp }}/repotoire-results/results.sarif.json
          category: repotoire
